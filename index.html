<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>温正畅</title>
  <style>
    :root { --bg: #fafafa; --text: #333; --muted: #666; --accent: #2a7dd2; --border: #e0e0e0; --card: #fff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; font-size: 15px; }
    .container { max-width: 780px; margin: 60px auto; padding: 0 24px; }
    .header { display: flex; gap: 28px; align-items: flex-start; margin-bottom: 40px; }
    .avatar {
      width: 110px; height: 110px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #2a7dd2, #5b9bd5);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; color: #fff; font-weight: 700; letter-spacing: 2px;
    }
    .header-info h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .header-info .title { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .socials { display: flex; gap: 10px; flex-wrap: wrap; }
    .socials a {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); text-decoration: none; font-size: 13px;
      transition: all 0.2s;
    }
    .socials a:hover { border-color: var(--accent); color: var(--accent); }
    .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; margin-bottom: 20px; }
    .section h2 { font-size: 16px; font-weight: 600; color: var(--text); border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 4px; margin-bottom: 16px; }
    .section p { color: var(--muted); margin-bottom: 10px; }
    .section p:last-child { margin-bottom: 0; }
    .news-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .news-item:last-child { border-bottom: none; }
    .news-item .tag { display: inline-block; background: #e8f0fb; color: var(--accent); font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 6px; font-weight: 500; }
    .news-item .date { color: #999; font-size: 12px; float: right; }
    .news-item a { color: var(--accent); text-decoration: none; }
    .news-item a:hover { text-decoration: underline; }
    .footer { text-align: center; color: #aaa; font-size: 12px; padding: 30px 0; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="avatar">温</div>
    <div class="header-info">
      <h1>温正畅</h1>
      <div class="title">个人主页</div>
      <div class="socials">
        <a href="https://github.com/wenzhengchang" target="_blank">GitHub</a>
        <a href="mailto:819192552@qq.com">Email</a>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>About Me</h2>
    <p>你好！欢迎来到我的个人主页 👋</p>
    <p>这里会陆续完善，敬请期待。</p>
  </div>

  <div class="section">
    <h2>Recent Updates</h2>
    <div class="news-item">
      <span class="tag">更新</span>
      <span class="date">2026.04.05</span>
      <a href="#">个人主页正式上线</a>
    </div>
  </div>

  <div class="footer">
    &copy; 2026 温正畅 · 托管于 GitHub Pages
  </div>

</div>
</body>
</html>
